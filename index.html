<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Gerador de Carrossel · IA</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Caveat:wght@600;700&family=Barlow:wght@400;500;600&family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Montserrat:wght@600;700&family=Roboto:wght@400;500;600&family=Inter:wght@400;500;600&family=Ubuntu:wght@400;500;700&family=Lora:wght@400;600&display=swap" rel="stylesheet"/>
  
  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/editor.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
</head>

<body>
  <div class="wrap">
    <!-- TODO seu conteúdo inteiro permanece igual -->
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/export.js"></script>
  <script src="js/ai-integration.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/history.js"></script>
  <script src="js/main.js"></script>

  <!-- ✅ ADICIONADO (CONTROLES) -->
  <script src="js/slide-controls.js"></script>
  <script>
    const _origRender = renderSlides;
    renderSlides = function(...args) {
      _origRender(...args);
      setTimeout(() => SlideControls.injetarEmTodos(), 200);
    };
  </script>

  <!-- SEU SCRIPT FINAL (já existia) -->
  <script>
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabName).style.display = 'block';
      event.target.classList.add('active');

      if (tabName === 'favoritos') loadFavoritosList();
      else if (tabName === 'projetos') loadProjetosList();
      else if (tabName === 'historico') loadHistoricoList();
    }

    function loadFavoritosList() {
      const list = document.getElementById('favoritosList');
      const favoritos = Storage.getFavoritos();

      if (favoritos.length === 0) {
        list.innerHTML = '<p style="color:#333;text-align:center;padding:20px;">Nenhum favorito ainda</p>';
        return;
      }

      list.innerHTML = favoritos.map(fav => `
        <div style="background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:bold;">${fav.nome}</div>
            <div style="font-size:11px;color:#666;margin-top:4px;">${fav.thumbnail}</div>
            <div style="font-size:10px;color:#444;margin-top:2px;">${formatDate(fav.criado)}</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn-sm" onclick="loadFavorito('${fav.id}'); switchTab('gerar')">✓ Carregar</button>
            <button class="btn-sm danger" onclick="deletarFavorito('${fav.id}')">🗑</button>
          </div>
        </div>
      `).join('');
    }

    function deletarFavorito(id) {
      if (confirm('Tem certeza?')) {
        Storage.deleteFavorito(id);
        loadFavoritosList();
      }
    }

    function loadProjetosList() {
      const list = document.getElementById('projetosList');
      const projetos = Storage.getProjetos();

      if (projetos.length === 0) {
        list.innerHTML = '<p style="color:#333;text-align:center;padding:20px;">Nenhum projeto ainda</p>';
        return;
      }

      list.innerHTML = projetos.map(proj => `
        <div style="background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:bold;">${proj.nome}</div>
            <div style="font-size:10px;color:#666;margin-top:4px;">Criado: ${formatDate(proj.criado)}</div>
            <div style="font-size:10px;color:#666;margin-top:2px;">Modificado: ${formatDate(proj.modificado)}</div>
          </div>
          <div style="display:flex;gap:6px;flex-direction:column;">
            <button class="btn-sm" onclick="loadProject('${proj.id}'); switchTab('gerar')">✓ Abrir</button>
            <button class="btn-sm" onclick="duplicarProject('${proj.id}')">📋 Duplicar</button>
            <button class="btn-sm danger" onclick="deletarProject('${proj.id}')">🗑 Deletar</button>
          </div>
        </div>
      `).join('');
    }

    function deletarProject(id) {
      if (confirm('Tem certeza?')) {
        Storage.deleteProject(id);
        loadProjetosList();
      }
    }

    function duplicarProject(id) {
      const nome = prompt('Nome da cópia:');
      if (nome) {
        const newId = Storage.duplicateProject(id, nome);
        if (newId) {
          loadProjetosList();
          showSuccess('✓ Projeto duplicado!');
        }
      }
    }

    function loadHistoricoList() {
      const list = document.getElementById('historicoList');
      const historico = Storage.getHistorico();

      if (historico.length === 0) {
        list.innerHTML = '<p style="color:#333;text-align:center;padding:20px;">Histórico vazio</p>';
        return;
      }

      list.innerHTML = historico.map(item => `
        <div style="background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:bold;">${item.tema}</div>
            <div style="font-size:11px;color:#666;margin-top:4px;">Tipo: ${item.tipo}</div>
            <div style="font-size:10px;color:#444;margin-top:2px;">${formatDate(item.criado)}</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn-sm" onclick="usarHistorico('${item.id}')">✓ Usar</button>
          </div>
        </div>
      `).join('');
    }

    function usarHistorico(id) {
      const item = Storage.getHistoricoItem(id);
      if (item) {
        estado.slidesData = item.slides;
        Object.assign(estado, item.config);
        renderSlides(item.slides, item.config.handle || '@suamarca');
        switchTab('gerar');
        initUI();
      }
    }
  </script>

</body>
</html>
